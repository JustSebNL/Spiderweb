# Spiderweb installer configuration
#
# Copy/edit this file to change install locations and versions.
# The installer auto-loads this file when it sits next to install_spiderweb.sh.
# You can also point to another config file:
#   INSTALL_CONFIG=/path/to/my-config.conf ./install_spiderweb.sh

# Repository and source checkout location
SPIDERWEB_REPO="https://github.com/JustSebNL/Spiderweb.git"
SPIDERWEB_DIR="${HOME}/spiderweb"

# Where spiderweb binary will be installed (binary goes to: <INSTALL_PREFIX>/bin/spiderweb)
INSTALL_PREFIX="${HOME}/.local"

# Go requirements and installation location
MIN_GO_VERSION="1.25.0"
GO_VERSION="1.26.1"
GO_INSTALL_DIR="${HOME}/.local/go"

# Go tarball checksum verification
# 1 = verify checksum (recommended), 0 = skip verification
VERIFY_GO_CHECKSUM="1"

# Optional explicit SHA256 value for the selected Go tarball.
# If empty, installer will fetch checksum from: https://go.dev/dl/<go-tarball>.sha256
GO_CHECKSUM="031f088e5d955bab8657ede27ad4e3bc5b7c1ba281f05f245bcc304f327c987a"
