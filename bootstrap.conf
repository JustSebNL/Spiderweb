# Spiderweb full-stack bootstrap configuration
# This file is intended for the bare-system bootstrap script.

SPIDERWEB_DIR="$HOME/spiderweb"
SPIDERWEB_HOME_DIR="$HOME/.spiderweb"
RUNTIME_ENV_FILE="$SPIDERWEB_HOME_DIR/runtime.env"
SETUP_NOTES_FILE="$SPIDERWEB_HOME_DIR/setup-notes.txt"
BOOTSTRAP_STATE_FILE="$SPIDERWEB_HOME_DIR/bootstrap-state.env"
INSTALL_PREFIX="$HOME/.local"
GO_INSTALL_DIR="$HOME/.local/go"
TRIGGER_DIR="$SPIDERWEB_DIR/trigger"
YOUTU_DIR="$SPIDERWEB_DIR/youtu-llm"
YOUTU_MODEL_REPO="tencent/Youtu-LLM-2B"
YOUTU_GGUF_REPO="tencent/Youtu-LLM-2B-GGUF"
YOUTU_GGUF_FILE="Youtu-LLM-2B-Q8_0.gguf"
YOUTU_CACHE_DIR="$YOUTU_DIR/model-cache"
YOUTU_VLLM_IMAGE="spiderweb/youtu-vllm:0.10.2"
YOUTU_VLLM_CONTAINER_NAME="youtu-vllm"
YOUTU_VLLM_PORT="8000"
YOUTU_LLAMA_CPP_PORT="8081"
TRIGGER_PROJECT_REF="spiderweb"
TRIGGER_ACCESS_TOKEN=""
HF_TOKEN=""
# HF_TOKEN is optional for the public Youtu repos.
# Keep it empty unless you need authenticated Hugging Face access.
AUTO_START_MODEL_SERVICE="1"
ENABLE_TRIGGER_WORKSPACE="0"
AUTO_INSTALL_TRIGGER_DEPS="0"
CHEAP_COGNITION_RUNTIME="auto"
